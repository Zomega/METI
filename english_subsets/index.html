<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Word Subsets Explorer</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 8px;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background: #fff;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            z-index: 10;
        }

        .header-left h1 { font-size: 1.25rem; font-weight: 700; color: var(--primary); }
        .header-left p { font-size: 0.875rem; color: var(--text-muted); }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        aside {
            width: 300px;
            background: #fff;
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        main {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            position: relative;
        }

        .filter-group h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.625rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus { border-color: var(--primary); }

        .tag-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }

        .tag-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tag-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .source-checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
        }

        .stats-banner {
            background: #e0e7ff;
            color: #3730a3;
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1rem;
        }

        .word-card {
            background: var(--card-bg);
            padding: 1rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            transition: transform 0.2s;
        }

        .word-card:hover { transform: translateY(-2px); }

        .word-name { font-weight: 700; font-size: 1.125rem; }

        .word-category {
            display: inline-block;
            font-size: 0.625rem;
            font-weight: 700;
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .sources {
            display: flex;
            gap: 0.25rem;
            flex-wrap: wrap;
            margin-top: auto;
        }

        .source-pill {
            font-size: 0.625rem;
            background: #f1f5f9;
            color: #475569;
            padding: 0.125rem 0.375rem;
            border-radius: 2px;
        }

        #loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            font-weight: 600;
        }

        /* Category Colors */
        .cat-People { background: #fee2e2; color: #991b1b; }
        .cat-Business { background: #fef3c7; color: #92400e; }
        .cat-Visual { background: #dcfce7; color: #166534; }
        .cat-Nature { background: #d1fae5; color: #065f46; }
        .cat-Time { background: #e0e7ff; color: #3730a3; }
        .cat-Mathematics { background: #f3e8ff; color: #6b21a8; }
        .cat-Default { background: #f1f5f9; color: #475569; }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            aside { width: 100%; height: auto; max-height: 40vh; border-right: none; border-bottom: 1px solid var(--border); }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <h1>English Word Explorer</h1>
        <p>Exploring merged subsets of core English vocabulary</p>
    </div>
</header>

<div class="container">
    <aside>
        <div class="filter-group">
            <h3>Search Words</h3>
            <input type="text" id="search-input" placeholder="Type to filter...">
        </div>

        <div class="filter-group">
            <h3>Categories</h3>
            <div class="tag-list" id="category-tags">
                <!-- JS Populated -->
            </div>
        </div>

        <div class="filter-group">
            <h3>Sources</h3>
            <div id="source-filters">
                <label class="source-checkbox"><input type="checkbox" value="globish" checked> Globish</label>
                <label class="source-checkbox"><input type="checkbox" value="ogdens_basic_english" checked> Ogden's Basic</label>
                <label class="source-checkbox"><input type="checkbox" value="upgoer5" checked> Up-Goer 5</label>
                <label class="source-checkbox"><input type="checkbox" value="voa_special_english" checked> VOA Special</label>
            </div>
        </div>
    </aside>

    <main>
        <div id="loading-overlay">Merging datasets...</div>
        <div class="stats-banner" id="stats-banner">
            Loading data...
        </div>
        <div class="word-grid" id="word-grid">
            <!-- JS Populated -->
        </div>
    </main>
</div>

<script>
    const FILES = [
        'globish.csv',
        'ogdens_basic_english.csv',
        'upgoer5.csv',
        'voa_special_english.csv'
    ];

    const ALLOWED_CATEGORIES = [
        "People", "Business", "Visual", "Nature", "Time", "Mathematics", 
        "Education", "Direction", "Political", "Body Parts", "Household", 
        "War", "Transport", "Materials", "Food/Drink", "Industry", 
        "Agriculture", "Tools", "Buildings", "Animals", "Clothes", "Color"
    ];

    let allWords = [];
    let activeCategory = null;

    async function init() {
        try {
            const dataMap = new Map();

            // Fetch and parse all files
            await Promise.all(FILES.map(async (filename) => {
                const response = await fetch(filename);
                const text = await response.text();
                const sourceName = filename.replace('.csv', '');
                
                text.split('\n').forEach(line => {
                    const [word, category] = line.split(',').map(s => s?.trim());
                    if (!word || !category || !ALLOWED_CATEGORIES.includes(category)) return;

                    if (!dataMap.has(word)) {
                        dataMap.set(word, { word, catCounts: {}, sources: new Set() });
                    }
                    
                    const entry = dataMap.get(word);
                    entry.catCounts[category] = (entry.catCounts[category] || 0) + 1;
                    entry.sources.add(sourceName);
                });
            }));

            // Resolve to single category
            allWords = Array.from(dataMap.values()).map(entry => {
                const sortedCats = Object.entries(entry.catCounts).sort((a, b) => {
                    if (b[1] !== a[1]) return b[1] - a[1]; // Most frequent
                    return a[0].localeCompare(b[0]); // Alphabetical tie-breaker
                });

                return {
                    word: entry.word,
                    category: sortedCats[0][0],
                    sources: Array.from(entry.sources).sort()
                };
            }).sort((a, b) => a.word.localeCompare(b.word));

            document.getElementById('loading-overlay').style.display = 'none';
            renderCategoryTags();
            render();
            
            // Event Listeners
            document.getElementById('search-input').addEventListener('input', render);
            document.querySelectorAll('#source-filters input').forEach(cb => cb.addEventListener('change', render));
            
        } catch (err) {
            console.error("Failed to load datasets:", err);
            document.getElementById('stats-banner').textContent = "Error loading data. Please ensure you are viewing this via a local server.";
        }
    }

    function renderCategoryTags() {
        const container = document.getElementById('category-tags');
        const sortedCats = [...ALLOWED_CATEGORIES].sort();
        
        container.innerHTML = `<button class="tag-btn active" onclick="setCategory(null)">All</button>`;
        sortedCats.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'tag-btn';
            btn.textContent = cat;
            btn.onclick = () => setCategory(cat);
            container.appendChild(btn);
        });
    }

    function setCategory(cat) {
        activeCategory = cat;
        document.querySelectorAll('.tag-btn').forEach(btn => {
            btn.classList.toggle('active', btn.textContent === (cat || 'All'));
        });
        render();
    }

    function render() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const activeSources = Array.from(document.querySelectorAll('#source-filters input:checked')).map(cb => cb.value);
        
        const filtered = allWords.filter(item => {
            const matchesSearch = item.word.toLowerCase().includes(query);
            const matchesCat = !activeCategory || item.category === activeCategory;
            const matchesSource = item.sources.some(s => activeSources.includes(s));
            return matchesSearch && matchesCat && matchesSource;
        });

        document.getElementById('stats-banner').textContent = 
            `Showing ${filtered.length} words out of ${allWords.length} total.`;

        const grid = document.getElementById('word-grid');
        grid.innerHTML = filtered.slice(0, 500).map(item => `
            <div class="word-card">
                <div class="word-name">${item.word}</div>
                <div>
                    <span class="word-category cat-${item.category.replace(/ /g, '') || 'Default'}">${item.category}</span>
                </div>
                <div class="sources">
                    ${item.sources.map(s => `<span class="source-pill">${s.replace(/_/g, ' ')}</span>`).join('')}
                </div>
            </div>
        `).join('');

        if (filtered.length > 500) {
            grid.innerHTML += `<div style="grid-column: 1/-1; text-align: center; padding: 2rem; color: var(--text-muted);">... and ${filtered.length - 500} more words. Narrow your search to see more.</div>`;
        }
    }

    init();
</script>
</body>
</html>
